<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>AI 健身体型扫描仪 | AI Fitness Body Scanner</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <header class="app-header glass">
        <div class="logo-mark">AI</div>
        <div class="header-text">
          <h1>AI 健身体型扫描仪 <span class="en-sub">AI Fitness Body Scanner</span></h1>
          <p>AI 智能体态扫描 · 模拟你的蜕变 <span class="en-sub">AI-Powered Body Scan · Simulate Your Transformation</span></p>
        </div>
        <div class="header-device-actions">
          <button type="button" class="device-btn" id="btn-fullscreen" title="全屏 / Fullscreen">⛶</button>
          <button type="button" class="header-memoir-btn" id="header-memoir-btn">形象画廊·回忆录 Avatar Gallery · Memoir</button>
        </div>
      </header>

      <main class="app-main">
        <section class="panel input-panel glass">
          <h2>基本信息 <span class="en-sub">Basic Info</span></h2>
          <div id="input-panel-root"></div>
        </section>

        <section class="panel scanner-panel glass">
          <h2>AI 体态扫描 <span class="en-sub">AI Body Scan</span></h2>
          <div id="scanner-panel-root"></div>
        </section>

        <section class="panel simulation-panel glass">
          <h2>体型可视化与模拟 <span class="en-sub">Body Visualization &amp; Simulation</span></h2>
          <div id="visualization-root"></div>
        </section>
      </main>

      <footer class="app-footer">
        <span>本体验仅供视觉演示，不构成医学建议。 This experience is for visual demonstration only, not medical advice.</span>
      </footer>
    </div>

    <script type="importmap">
      { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js" } }
    </script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
